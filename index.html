<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>基督徒回顧影片製作</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c0392b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="詩歌影片">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Iansui&family=Noto+Serif+TC:wght@400;700&display=swap');

  :root {
    --bg: #fdf6ee;
    --card: #ffffff;
    --accent: #c0392b;
    --accent2: #e67e22;
    --text: #2c1810;
    --muted: #8b6f5e;
    --border: #e8d5c4;
    --shadow: 0 4px 24px rgba(44,24,16,0.10);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 20%, #fde8d8 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, #fdf0e0 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Iansui', 'Noto Serif TC', serif;
    color: var(--text);
    padding: 24px 16px 60px;
  }

  h1 {
    font-size: 2.6rem;
    font-weight: 700;
    text-align: center;
    color: var(--accent);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    font-size: 1.2rem;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 28px;
    max-width: 900px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px 36px;
    box-shadow: var(--shadow);
    border: 2px solid var(--border);
  }

  .step-label {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .step-num {
    background: var(--accent);
    color: #fff;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; font-weight: 700;
    flex-shrink: 0;
  }
  .card h2 {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 18px;
  }

  /* ── 照片上傳區 ── */
  #drop-zone {
    border: 3px dashed var(--accent2);
    border-radius: 16px;
    padding: 36px;
    text-align: center;
    cursor: pointer;
    transition: background .2s;
    background: #fffaf5;
  }
  #drop-zone:hover, #drop-zone.drag-over { background: #fff0e0; }
  #drop-zone .icon { font-size: 3.5rem; }
  #drop-zone p { font-size: 1.5rem; color: var(--muted); margin-top: 10px; }
  #drop-zone input { display: none; }

  /* ── 照片列表（每列一張） ── */
  #photo-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
  }

  .photo-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px 14px;
    background: #fffaf5;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    transition: border-color .2s, box-shadow .2s;
  }
  .photo-row:hover { border-color: var(--accent2); box-shadow: 0 2px 10px rgba(230,126,34,.12); }
  .photo-row.dragging { opacity: .4; border-color: var(--accent); }
  .photo-row.drag-over-top {
    border-top: 3px solid var(--accent);
    background: #fff5ec;
  }

  .drag-handle {
    font-size: 1.4rem;
    color: #c5a898;
    cursor: grab;
    flex-shrink: 0;
    user-select: none;
  }
  .photo-num {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
    user-select: none;
  }
  .photo-thumb {
    width: 88px;
    height: 66px;
    object-fit: cover;
    border-radius: 10px;
    flex-shrink: 0;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .photo-fname {
    font-size: .95rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
    flex: 1;
  }

  /* 文字輸入欄：佔整行，在手機上自動換到第二行 */
  .photo-text-wrap {
    flex-basis: 100%;
    min-width: 0;
    position: relative;
  }
  .photo-text-input {
    font-family: 'Iansui', 'Noto Serif TC', serif;
    font-size: 1.55rem;
    width: 100%;
    padding: 9px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color .2s, background .2s;
  }
  .photo-text-input:focus { border-color: var(--accent2); }
  .photo-text-input::placeholder { color: #c8aba0; font-size: 1.1rem; font-family: 'Iansui', 'Noto Serif TC', serif; }
  .photo-text-input.has-text {
    border-color: #7ec87a;
    background: #f4fff3;
  }

  .photo-del {
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: #c5a898;
    flex-shrink: 0;
    padding: 5px 7px;
    border-radius: 8px;
    transition: color .15s, background .15s;
    line-height: 1;
  }
  .photo-del:hover { color: var(--accent); background: #fdecea; }

  .hint { font-size: 1.1rem; color: var(--muted); margin-top: 12px; line-height: 1.7; }

  /* ── 音樂分類 tabs ── */
  .music-tabs {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 18px;
  }
  .music-tab {
    padding: 7px 18px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: #fffaf5;
    font-family: 'Iansui', 'Noto Serif TC', serif;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--muted);
    transition: all .15s;
  }
  .music-tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .music-tab.active { border-color: var(--accent); background: var(--accent); color: #fff; }

  /* ── 音樂 ── */
  .music-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .music-card {
    border: 2.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    transition: border-color .2s, background .2s;
    background: #fffaf5;
    position: relative;
    overflow: hidden;
  }
  .music-card:hover { border-color: var(--accent2); background: #fff5ec; }
  .music-card.selected { border-color: var(--accent); background: #fff0e8; }
  .music-icon { font-size: 2.2rem; flex-shrink: 0; }
  .music-name { font-size: 1.3rem; font-weight: 700; }
  .music-card .play-btn {
    margin-left: auto; background: none; border: none;
    font-size: 1.5rem; cursor: pointer; color: var(--accent2);
    min-width: 64px; display: flex; align-items: center;
    justify-content: center; gap: 4px; white-space: nowrap;
  }
  .play-btn .cd { font-size: .85rem; opacity: .8; }
  .music-preview-bar {
    position: absolute; bottom: 0; left: 0;
    height: 4px; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 0 2px 0 14px;
    pointer-events: none;
  }
  .music-loading { font-size: 1.3rem; color: var(--muted); padding: 16px 0; }

  /* ── 輸出 ── */
  #make-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 24px;
    font-size: 2rem;
    font-family: 'Iansui', 'Noto Serif TC', serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 4px;
    box-shadow: 0 6px 24px rgba(192,57,43,.3);
    transition: transform .15s, box-shadow .15s;
    display: flex; align-items: center; justify-content: center; gap: 14px;
  }
  #make-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(192,57,43,.4); }
  #make-btn:active { transform: translateY(0); }
  #make-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  #status-box {
    display: none;
    margin-top: 22px;
    border-radius: 14px;
    padding: 22px 26px;
    font-size: 1.4rem;
    line-height: 1.8;
    white-space: pre-wrap;
  }
  #status-box.info    { background: #e8f4fd; border: 2px solid #3498db; color: #1a5276; }
  #status-box.success { background: #e9f7ef; border: 2px solid #27ae60; color: #1e8449; }
  #status-box.error   { background: #fdedec; border: 2px solid #e74c3c; color: #922b21; }

  #progress-bar-wrap {
    height: 16px; background: #e8d5c4; border-radius: 8px;
    margin-top: 14px; overflow: hidden; display: none;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
    background-size: 200% 100%;
    border-radius: 8px; width: 0%;
    transition: width .5s ease;
    animation: shimmer 2s infinite linear;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  #download-link {
    display: none;
    margin-top: 18px;
    background: #27ae60;
    color: #fff;
    border-radius: 14px;
    padding: 18px 28px;
    font-size: 1.6rem;
    font-family: 'Iansui', 'Noto Serif TC', serif;
    font-weight: 700;
    text-decoration: none;
    text-align: center;
    letter-spacing: 3px;
    box-shadow: 0 4px 18px rgba(39,174,96,.3);
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #f0e6dc; }
  ::-webkit-scrollbar-thumb { background: #c8a99a; border-radius: 4px; }

  /* PWA install overlay */
  .pwa-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(160deg, #2c1810 0%, #c0392b 50%, #e67e22 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 28px; text-align: center;
    animation: pwaFadeIn .35s ease;
  }
  @keyframes pwaFadeIn { from { opacity: 0; transform: scale(1.04); } to { opacity: 1; transform: scale(1); } }
  .pwa-overlay-icon { font-size: 5rem; margin-bottom: 20px; }
  .pwa-overlay-title { font-size: 2rem; font-weight: 700; color: #fff; letter-spacing: 3px; margin-bottom: 10px; font-family: 'Iansui', 'Noto Serif TC', serif; }
  .pwa-overlay-sub { font-size: 1.1rem; color: rgba(255,255,255,.8); margin-bottom: 40px; line-height: 1.7; }
  .pwa-overlay-steps { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 36px; }
  .pwa-overlay-step { background: rgba(255,255,255,.15); border-radius: 14px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; text-align: left; }
  .pwa-overlay-step-ico { font-size: 1.8rem; flex-shrink: 0; }
  .pwa-overlay-step-txt { color: #fff; }
  .pwa-overlay-step-txt strong { display: block; font-size: 1rem; font-weight: 700; }
  .pwa-overlay-step-txt span { font-size: .85rem; opacity: .8; }
  .pwa-overlay-btn {
    width: 100%; max-width: 380px; padding: 20px;
    background: #fff; color: #c0392b;
    border: none; border-radius: 16px;
    font-size: 1.3rem; font-weight: 700; cursor: pointer;
    font-family: 'Iansui', 'Noto Serif TC', serif; letter-spacing: 2px;
    box-shadow: 0 6px 24px rgba(0,0,0,.25); margin-bottom: 14px;
  }
  .pwa-overlay-skip {
    background: none; border: none; color: rgba(255,255,255,.6);
    font-size: 1rem; cursor: pointer; padding: 8px;
    font-family: 'Iansui', 'Noto Serif TC', serif;
  }
</style>
</head>
<body>

<h1>基督徒回顧影片製作</h1>
<p class="subtitle">照片＋詩歌＝影片</p>

<div id="pwa-banner" style="max-width:900px;margin:0 auto;padding:0 16px;"></div>

<div class="steps">

  <!-- STEP 1: 照片 + 每張文字 -->
  <div class="card">
    <div class="step-label"><div class="step-num">1</div>選擇照片，加上文字</div>
    <h2>點擊或拖曳上傳照片和影片</h2>
    <div id="drop-zone">
      <div class="icon">🖼️</div>
      <p>選擇照片或影片</p>
      <p style="font-size:1.1rem;margin-top:6px">（可以一次選很多張）</p>
      <input type="file" id="photo-input" accept="image/*,video/*" multiple>
    </div>
    <div id="photo-list"></div>
    <p class="hint" id="photo-count-hint" style="display:none"></p>
  </div>

  <!-- STEP 2: 音樂 -->
  <div class="card">
    <div class="step-label"><div class="step-num">2</div>選擇背景音樂</div>
    <h2>請選一首歌曲</h2>
    <div class="music-tabs" id="music-tabs"></div>
    <div class="music-grid" id="music-grid">
      <p class="music-loading">🎵 載入音樂庫中⋯⋯</p>
    </div>
  </div>

  <!-- STEP 3: 輸出 -->
  <div class="card">
    <div class="step-label"><div class="step-num">3</div>製作影片</div>
    <h2>確認後開始製作</h2>
    <div style="margin-bottom:20px;padding:20px;background:var(--bg);border-radius:16px;border:2px solid var(--border);">
      <div style="font-weight:700;color:var(--accent);letter-spacing:2px;margin-bottom:14px;">🎬 片頭設定（可略）</div>
      <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;">
        <!-- 片頭照片 -->
        <div style="flex:0 0 auto;">
          <label style="display:block;font-size:.9rem;color:var(--muted);margin-bottom:6px;">背景照片</label>
          <div id="intro-photo-zone" onclick="document.getElementById('intro-photo-input').click()"
            style="width:120px;height:80px;border:2px dashed var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:#fff;">
            <span id="intro-photo-placeholder" style="font-size:.85rem;color:var(--muted);text-align:center;line-height:1.4;">點此上傳<br>片頭照片</span>
            <img id="intro-photo-preview" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;">
          </div>
          <input type="file" id="intro-photo-input" accept="image/*" style="display:none">
          <button id="intro-photo-clear" onclick="clearIntroPhoto()" style="display:none;margin-top:4px;font-size:.8rem;background:none;border:none;color:var(--muted);cursor:pointer;text-decoration:underline;">移除照片</button>
        </div>
        <!-- 片頭文字 -->
        <div style="flex:1;min-width:180px;">
          <label style="display:block;font-size:.9rem;color:var(--muted);margin-bottom:6px;">標題文字</label>
          <input type="text" id="intro-title" maxlength="24"
            placeholder="例：2026年終數算"
            style="width:100%;padding:10px 14px;font-size:1.1rem;font-family:inherit;border:2px solid var(--border);border-radius:10px;outline:none;background:#fff;"
            oninput="updateSummary()">
          <p style="margin-top:6px;font-size:.85rem;color:var(--muted);">無照片→黑底白字；有照片→疊在照片上</p>
        </div>
      </div>
    </div>
    <div id="summary" style="font-size:1.2rem;color:var(--muted);margin-bottom:18px;line-height:2;"></div>
    <button id="make-btn" disabled>🎬 &nbsp;開始製作影片</button>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="status-box"></div>
    <a id="download-link" href="#" download="slideshow.mp4">⬇️ &nbsp;下載影片</a>
  </div>

</div>

<script>
// ── 設定 ────────────────────────────────────────────
const MUSIC_BASE     = 'https://raw.githubusercontent.com/alice55505-source/photo-hymn-video/main/music/';
const MUSIC_TREE_URL = 'https://api.github.com/repos/alice55505-source/photo-hymn-video/git/trees/main?recursive=1';
const N8N_WEBHOOK    = 'https://n8n.alice55505.dpdns.org/webhook/slideshow';
const N8N_STATUS_URL = 'https://n8n.alice55505.dpdns.org/webhook/slideshow-status';
// 分類順序
const CATEGORY_ORDER = ['傳福音','福音','愛','同伴','牧養','奉獻','召會生活','親近主','患難安慰','台語詩歌'];
// ────────────────────────────────────────────────────

// photos[i] = { type:'photo'|'video', file, dataUrl, name, text, duration(video only) }
let photos = [];
let selectedMusic = null;
let audioPlayer = null;
let dragSrcIdx = null;
let introPhotoData = null; // base64 of intro background photo
const PREVIEW_SEC = 20;
let previewTimerId = null;
let previewIntervalId = null;

// ── 照片上傳 ──
const dropZone  = document.getElementById('drop-zone');
const photoInput = document.getElementById('photo-input');

dropZone.addEventListener('click', () => photoInput.click());
photoInput.addEventListener('change', e => addPhotos(e.target.files));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addPhotos(e.dataTransfer.files);
});

function addPhotos(files) {
  Array.from(files).forEach(file => {
    const isVideo = file.type.startsWith('video/') || file.name.match(/\.(mp4|mov|avi|webm|mkv|m4v)$/i);
    const isImage = file.type.startsWith('image/') || file.name.match(/\.(jpe?g|png|gif|webp|heic)$/i);
    if (!isVideo && !isImage) return;

    if (isVideo) {
      const url = URL.createObjectURL(file);
      const vid = document.createElement('video');
      vid.preload = 'metadata';
      vid.onloadedmetadata = () => {
        openTrimmer(file, url, result => {
          photos.push({ type: 'video', file, dataUrl: url,
            base64: result.base64, name: file.name, text: '',
            duration: result.duration, mimeType: result.mimeType });
          renderPhotoList();
        });
      };
      vid.src = url;
    } else {
      const reader = new FileReader();
      reader.onload = e => {
        photos.push({ type: 'photo', file, dataUrl: e.target.result, name: file.name, text: '' });
        renderPhotoList();
      };
      reader.readAsDataURL(file);
    }
  });
}

function renderPhotoList() {
  const list = document.getElementById('photo-list');
  list.innerHTML = '';

  photos.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'photo-row';
    row.draggable = true;
    row.dataset.idx = i;

    const isVid = p.type === 'video';
    const dur = isVid ? Math.round(p.duration) : 4;
    const thumb = isVid
      ? `<video class="photo-thumb" src="${p.dataUrl}" muted preload="metadata" style="object-fit:cover;"></video>`
      : `<img class="photo-thumb" src="${p.dataUrl}" alt="">`;
    const badge = isVid ? `<span style="font-size:.75rem;background:#333;color:#fff;border-radius:4px;padding:1px 5px;margin-left:4px;">🎬 ${dur}s</span>` : '';
    row.innerHTML = `
      <span class="drag-handle" title="拖曳排序">⠿</span>
      <span class="photo-num">${i + 1}</span>
      ${thumb}
      <span class="photo-fname" title="${p.name}">${p.name}${badge}</span>
      <div class="photo-text-wrap">
        <input type="text"
          class="photo-text-input${p.text ? ' has-text' : ''}"
          placeholder="${isVid ? '✍️  影片上的文字（可不填）' : '✍️  這張照片的文字（可不填）'}"
          value="${escapeAttr(p.text)}"
          data-idx="${i}">
      </div>
      <button class="photo-del" title="刪除" data-idx="${i}">✕</button>
    `;

    // 文字輸入即時更新
    row.querySelector('.photo-text-input').addEventListener('input', function() {
      photos[this.dataset.idx].text = this.value;
      this.classList.toggle('has-text', this.value.trim().length > 0);
      updateSummary();
    });

    // 刪除
    row.querySelector('.photo-del').addEventListener('click', function(e) {
      e.stopPropagation();
      photos.splice(+this.dataset.idx, 1);
      renderPhotoList();
    });

    // 拖曳排序
    row.addEventListener('dragstart', () => {
      dragSrcIdx = i;
      setTimeout(() => row.classList.add('dragging'), 0);
    });
    row.addEventListener('dragend', () => row.classList.remove('dragging'));
    row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over-top'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over-top'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over-top');
      if (dragSrcIdx !== null && dragSrcIdx !== i) {
        const moved = photos.splice(dragSrcIdx, 1)[0];
        photos.splice(i, 0, moved);
        renderPhotoList();
      }
    });

    list.appendChild(row);
  });

  // 提示
  const hint = document.getElementById('photo-count-hint');
  if (photos.length > 0) {
    const totalDur = photos.reduce((s, p) => s + (p.type === 'video' ? Math.round(p.duration) : 4), 0);
    const vidCount = photos.filter(p => p.type === 'video').length;
    const withText = photos.filter(p => p.text.trim()).length;
    hint.style.display = 'block';
    hint.innerHTML =
      `共 <strong>${photos.length}</strong> 個素材（${vidCount > 0 ? `含 ${vidCount} 段影片，` : ''}影片長度約 <strong>${totalDur}</strong> 秒）` +
      (withText > 0 ? `，其中 <strong>${withText}</strong> 個有文字` : '') +
      `。<br>可拖曳 ⠿ 調整順序。`;
  } else {
    hint.style.display = 'none';
  }

  updateSummary();
  checkReady();
}

function escapeAttr(s) {
  return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── 音樂庫 ──
let allMusicByCategory = {}; // { 分類: [{name, url, filename}] }
let activeCategory = '';

async function loadMusicList() {
  const grid = document.getElementById('music-grid');
  const tabsEl = document.getElementById('music-tabs');
  try {
    const res = await fetch(MUSIC_TREE_URL + '&_t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('無法連接音樂庫');
    const { tree } = await res.json();

    // 解析 music/{分類}/{歌名}.mp3（只顯示有實際音訊的檔案，size > 100 bytes）
    allMusicByCategory = {};
    tree.forEach(item => {
      const m = item.path.match(/^music\/([^/]+)\/([^/]+\.mp3)$/i);
      if (!m) return;
      if (!item.size || item.size < 100) return;  // 跳過空白佔位檔案
      const [, cat, file] = m;
      if (!allMusicByCategory[cat]) allMusicByCategory[cat] = [];
      allMusicByCategory[cat].push({
        name: file.replace(/\.mp3$/i, ''),
        filename: file,
        url: MUSIC_BASE + encodeURIComponent(cat) + '/' + encodeURIComponent(file)
      });
    });

    const cats = Object.keys(allMusicByCategory);
    if (cats.length === 0) {
      grid.innerHTML = '<p class="music-loading">⚠️ 音樂庫是空的</p>';
      return;
    }

    // 建 tabs：依順序出現的分類（無「全部」）
    const orderedCats = CATEGORY_ORDER.filter(c => allMusicByCategory[c]);
    if (!activeCategory || !allMusicByCategory[activeCategory]) {
      activeCategory = orderedCats[0] || '';
    }
    tabsEl.innerHTML = '';
    orderedCats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'music-tab' + (cat === activeCategory ? ' active' : '');
      btn.textContent = cat;
      btn.addEventListener('click', () => {
        activeCategory = cat;
        tabsEl.querySelectorAll('.music-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMusicGrid();
      });
      tabsEl.appendChild(btn);
    });

    renderMusicGrid();
  } catch(e) {
    grid.innerHTML = `<p class="music-loading">⚠️ 載入失敗：${e.message}</p>`;
  }
}

function renderMusicGrid() {
  const grid = document.getElementById('music-grid');
  grid.innerHTML = '';

  const songs = allMusicByCategory[activeCategory] || [];

  if (songs.length === 0) {
    grid.innerHTML = '<p class="music-loading">此分類尚無詩歌</p>';
    return;
  }

  songs.forEach(s => {
    const card = document.createElement('div');
    card.className = 'music-card';
    card.innerHTML = `
      <span class="music-icon">🎵</span>
      <div><div class="music-name">${s.name}</div></div>
      <button class="play-btn" title="試聽 20 秒">▶</button>
      <div class="music-preview-bar"></div>
    `;
    // 如果已選中此歌，恢復 selected 樣式
    if (selectedMusic && selectedMusic.url === s.url) card.classList.add('selected');

    card.addEventListener('click', e => {
      if (e.target.classList.contains('play-btn')) { togglePlay(card, s.url, e.target); return; }
      selectMusic(card, s.filename, s.url);
    });
    grid.appendChild(card);
  });
}

function selectMusic(card, name, url) {
  document.querySelectorAll('.music-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedMusic = { name, url };
  updateSummary(); checkReady();
}

function stopAllPreview() {
  if (audioPlayer) { audioPlayer.pause(); audioPlayer = null; }
  clearTimeout(previewTimerId);
  clearInterval(previewIntervalId);
  previewTimerId = previewIntervalId = null;
  document.querySelectorAll('.play-btn').forEach(b => b.textContent = '▶');
  document.querySelectorAll('.music-preview-bar').forEach(el => {
    el.style.transition = 'none'; el.style.width = '0%';
  });
}

function togglePlay(card, url, btn) {
  const isSame = audioPlayer && audioPlayer._url === url && !audioPlayer.paused;
  stopAllPreview();
  if (isSame) return;
  audioPlayer = new Audio(url);
  audioPlayer._url = url;
  audioPlayer.play();
  const bar = card.querySelector('.music-preview-bar');
  requestAnimationFrame(() => {
    bar.style.transition = 'none'; bar.style.width = '0%';
    requestAnimationFrame(() => {
      bar.style.transition = `width ${PREVIEW_SEC}s linear`;
      bar.style.width = '100%';
    });
  });
  let rem = PREVIEW_SEC;
  btn.innerHTML = `⏸ <span class="cd">${rem}s</span>`;
  previewIntervalId = setInterval(() => {
    rem--;
    if (rem > 0) btn.innerHTML = `⏸ <span class="cd">${rem}s</span>`;
    else btn.textContent = '▶';
  }, 1000);
  previewTimerId = setTimeout(stopAllPreview, PREVIEW_SEC * 1000);
  audioPlayer.addEventListener('ended', stopAllPreview);
}

// ── 摘要 & 按鈕 ──
function updateSummary() {
  const s = document.getElementById('summary');
  const photoCount = photos.filter(p => p.type !== 'video').length;
  const vidCount   = photos.filter(p => p.type === 'video').length;
  const withText   = photos.filter(p => p.text.trim()).length;
  const totalDur   = photos.reduce((a, p) => a + (p.type === 'video' ? Math.round(p.duration) : 4), 0);
  let lines = [];
  if (photos.length > 0) {
    const parts = [];
    if (photoCount > 0) parts.push(`${photoCount} 張照片`);
    if (vidCount   > 0) parts.push(`${vidCount} 段影片`);
    lines.push(`📷 素材：${parts.join(' + ')}（約 ${totalDur} 秒）`);
    if (withText > 0) lines.push(`✍️ 有文字：${withText} 個`);
    if (vidCount > 0)  lines.push(`🔇 影片段落音樂會自動降低音量`);
  }
  if (selectedMusic) lines.push(`🎵 音樂：${selectedMusic.name.replace(/\.mp3$/i,'')}`);
  const introTitle = (document.getElementById('intro-title')?.value || '').trim();
  const hasIntroPhoto = !!introPhotoData;
  if (hasIntroPhoto || introTitle) {
    const parts = [];
    if (hasIntroPhoto) parts.push('有照片');
    if (introTitle)    parts.push(`"${introTitle}"`);
    lines.push(`🎬 片頭：${parts.join(' + ')}`);
  }
  s.innerHTML = lines.join('<br>') || '（請先完成步驟 1 和 2）';
}

function checkReady() {
  document.getElementById('make-btn').disabled = !(photos.length > 0 && selectedMusic);
}

// ── 製作影片 ──
const CAN_LOCAL = typeof VideoEncoder !== 'undefined' && typeof AudioEncoder !== 'undefined';

document.getElementById('make-btn').addEventListener('click', async () => {
  if (!photos.length || !selectedMusic) return;
  CAN_LOCAL ? await makeVideoLocally() : await makeVideoRemote();
});

// ── 本地合成（WebCodecs，主路徑） ────────────────────────
async function makeVideoLocally() {
  const btn    = document.getElementById('make-btn');
  const dlLink = document.getElementById('download-link');
  btn.disabled = true;
  dlLink.style.display = 'none';
  setProgress(5);
  setStatus('info', '📦 載入合成工具⋯⋯');

  try {
    const { Muxer, ArrayBufferTarget } = await import('./mp4-muxer.js');
    await document.fonts.load("bold 72px 'Iansui'").catch(() => {});

    const FPS = 24, W = 1280, H = 720;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // 找支援的 H.264 codec（優先選相容性最高的 Baseline/Main Profile）
    const h264List = ['avc1.42E01E', 'avc1.42001f', 'avc1.420028', 'avc1.42002a', 'avc1.4d0028', 'avc1.640034'];
    let videoCodec = null;
    for (const c of h264List) {
      try {
        const s = await VideoEncoder.isConfigSupported({ codec: c, width: W, height: H, framerate: FPS });
        if (s.supported) { videoCodec = c; break; }
      } catch {}
    }
    if (!videoCodec) {
      setStatus('info', '⚠️ 本裝置不支援本地合成，改用伺服器⋯⋯');
      setProgress(0);
      return makeVideoRemote();
    }

    const target = new ArrayBufferTarget();
    const muxer  = new Muxer({
      target,
      video: { codec: 'avc', width: W, height: H },
      audio: { codec: 'aac', sampleRate: 44100, numberOfChannels: 2 },
      fastStart: 'in-memory'
    });

    let encoderError = null;
    const videoEncoder = new VideoEncoder({
      output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
      error: e => { encoderError = e; }
    });
    videoEncoder.configure({
      codec: videoCodec, width: W, height: H,
      bitrate: 3_000_000, framerate: FPS
    });

    let tsUs = 0;

    // 片頭
    const introTitle = (document.getElementById('intro-title')?.value || '').trim();
    if (introTitle || introPhotoData) {
      setStatus('info', '🎬 合成片頭⋯⋯');
      await drawIntroToCanvas(ctx, W, H, introTitle, introPhotoData);
      tsUs = await encodeStatic(canvas, videoEncoder, 3, tsUs);
      setProgress(8);
    }

    // 照片與影片
    for (let i = 0; i < photos.length; i++) {
      const p = photos[i];
      setProgress(8 + Math.round((i / photos.length) * 74));
      setStatus('info', `🎬 合成中：第 ${i + 1} / ${photos.length} 個素材⋯⋯`);

      if (p.type === 'video') {
        tsUs = await encodeVideoClipFrames(p, ctx, canvas, videoEncoder, W, H, tsUs);
      } else {
        const bmp = await loadBitmap(p.dataUrl);
        tsUs = await encodeKenBurns(p, bmp, ctx, canvas, videoEncoder, W, H, tsUs, i);
        bmp.close();
      }
    }

    await videoEncoder.flush();
    if (encoderError) throw encoderError;
    const totalSec = tsUs / 1_000_000;

    // 背景音樂
    setProgress(83);
    setStatus('info', '🎵 混入背景音樂⋯⋯');
    const audioRes = await fetch(selectedMusic.url);
    if (!audioRes.ok) throw new Error(`音樂下載失敗 (${audioRes.status})`);
    const audioCtx = new AudioContext({ sampleRate: 44100 });
    const decoded  = await audioCtx.decodeAudioData(await audioRes.arrayBuffer());
    audioCtx.close();

    let audioError = null;
    const audioEncoder = new AudioEncoder({
      output: (chunk, meta) => muxer.addAudioChunk(chunk, meta),
      error: e => { audioError = e; }
    });
    audioEncoder.configure({
      codec: 'mp4a.40.2', sampleRate: 44100, numberOfChannels: 2, bitrate: 128_000
    });

    const CHUNK = 4096;
    const totalFrames  = Math.ceil(totalSec * 44100);
    const fadeOutFrames = Math.round(2.5 * 44100); // 最後 2.5 秒漸出
    let aTs = 0;
    for (let off = 0; off < totalFrames; off += CHUNK) {
      const n  = Math.min(CHUNK, totalFrames - off);
      const ad = new AudioData({
        format: 'f32-planar', sampleRate: 44100,
        numberOfFrames: n, numberOfChannels: 2,
        timestamp: aTs, data: buildAudioData(decoded, off, n, totalFrames, fadeOutFrames)
      });
      audioEncoder.encode(ad);
      ad.close();
      aTs += Math.round((n / 44100) * 1_000_000);
    }
    await audioEncoder.flush();
    if (audioError) throw audioError;

    setProgress(96);
    setStatus('info', '📦 封裝影片⋯⋯');
    muxer.finalize();

    const blob = new Blob([target.buffer], { type: 'video/mp4' });
    const mb   = (blob.size / 1024 / 1024).toFixed(1);
    setProgress(100);
    setStatus('success', `🎉 影片製作完成！大小：${mb} MB`);
    dlLink.href     = URL.createObjectURL(blob);
    dlLink.download = `詩歌回顧_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '-')}.mp4`;
    dlLink.style.display = 'block';
    dlLink.click();

  } catch (e) {
    setProgress(0);
    setStatus('error', `❌ 製作失敗：${e.message}`);
    document.getElementById('make-btn').disabled = false;
  }
}

// 靜態幀（片頭用）：一個關鍵幀撐滿時間
async function encodeStatic(canvas, encoder, durationSec, startTs) {
  const frame = new VideoFrame(canvas, {
    timestamp: startTs,
    duration:  Math.round(durationSec * 1_000_000)
  });
  encoder.encode(frame, { keyFrame: true });
  frame.close();
  return startTs + Math.round(durationSec * 1_000_000);
}

// Ken Burns 緩慢縮放效果（照片用，8fps × 4秒 = 32 frames）
// 採用「模糊背景 + contain 主圖」：直式照片完整顯示，不裁切，黑邊用模糊版填滿
async function encodeKenBurns(p, bmp, ctx, canvas, encoder, W, H, startTs, idx) {
  const KB_FPS      = 8;
  const totalFrames = Math.round(4 * KB_FPS);
  const frameDurUs  = Math.round(1_000_000 / KB_FPS);
  const containScale = Math.min(W / bmp.width, H / bmp.height); // 完整顯示，不裁切
  const coverScale   = Math.max(W / bmp.width, H / bmp.height); // 填滿畫面用（背景）
  const ZOOM = 0.08;

  const zoomIn = (idx % 2 === 0);
  const z0 = zoomIn ? 1.0 : 1 + ZOOM;
  const z1 = zoomIn ? 1 + ZOOM : 1.0;

  let ts = startTs;
  for (let f = 0; f < totalFrames; f++) {
    const t    = f / (totalFrames - 1 || 1);
    const zoom = z0 + (z1 - z0) * t;

    // 先清黑底
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // 模糊背景：cover 模式填滿，遮住黑邊
    ctx.save();
    ctx.filter = 'blur(22px) brightness(0.55)';
    const bgSc = coverScale * 1.05;
    ctx.drawImage(bmp,
      (W - bmp.width  * bgSc) / 2,
      (H - bmp.height * bgSc) / 2,
      bmp.width  * bgSc,
      bmp.height * bgSc);
    ctx.restore();

    // 主圖：contain + Ken Burns，完整顯示不裁切
    const sc = containScale * zoom;
    const dw = bmp.width  * sc;
    const dh = bmp.height * sc;
    ctx.drawImage(bmp, (W - dw) / 2, (H - dh) / 2, dw, dh);

    if (p.text) drawTextOverlay(ctx, p.text, W, H);

    const frame = new VideoFrame(canvas, { timestamp: ts, duration: frameDurUs });
    encoder.encode(frame, { keyFrame: f === 0 });
    frame.close();
    ts += frameDurUs;
  }
  return ts;
}

// 影片剪輯：優先用 requestVideoFrameCallback 實時擷取，不支援則 seek
async function encodeVideoClipFrames(p, ctx, canvas, encoder, W, H, startTs) {
  const vid = document.createElement('video');
  // 優先使用剪輯後的 base64（來自 captureSegment），若無則用原始 blob URL
  vid.src = p.base64 ? `data:${p.mimeType};base64,${p.base64}` : p.dataUrl;
  vid.muted = true;
  await new Promise(r => { vid.oncanplay = r; vid.load(); });

  let ts = startTs;

  if ('requestVideoFrameCallback' in vid) {
    // 讓影片自然播放，每個解碼幀都擷取一次（和美圖秀秀一樣快）
    await new Promise((resolve, reject) => {
      const onFrame = (_, meta) => {
        if (meta.mediaTime >= p.duration - 0.04) { vid.pause(); resolve(); return; }

        const frameTs  = startTs + Math.round(meta.mediaTime * 1_000_000);
        const frameDur = Math.round(1_000_000 / 30);

        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
        const scale = Math.min(W / vid.videoWidth, H / vid.videoHeight);
        ctx.drawImage(vid,
          (W - vid.videoWidth  * scale) / 2,
          (H - vid.videoHeight * scale) / 2,
          vid.videoWidth * scale, vid.videoHeight * scale);
        if (p.text) drawTextOverlay(ctx, p.text, W, H);

        const frame = new VideoFrame(canvas, { timestamp: frameTs, duration: frameDur });
        encoder.encode(frame, { keyFrame: meta.mediaTime < 0.04 });
        frame.close();
        ts = frameTs + frameDur;

        vid.requestVideoFrameCallback(onFrame);
      };

      vid.requestVideoFrameCallback(onFrame);
      vid.play().catch(reject);
      // 保險：超過時間就強制結束
      setTimeout(() => { vid.pause(); resolve(); }, (p.duration + 2) * 1000);
    });
  } else {
    // 後備：seek 擷取（12fps）
    const CLIP_FPS   = 12;
    const frameCount = Math.round(p.duration * CLIP_FPS);
    const frameDurUs = Math.round(1_000_000 / CLIP_FPS);
    for (let f = 0; f < frameCount; f++) {
      vid.currentTime = f / CLIP_FPS;
      await new Promise(r => { vid.onseeked = r; });
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const scale = Math.min(W / vid.videoWidth, H / vid.videoHeight);
      ctx.drawImage(vid,
        (W - vid.videoWidth  * scale) / 2,
        (H - vid.videoHeight * scale) / 2,
        vid.videoWidth * scale, vid.videoHeight * scale);
      if (p.text) drawTextOverlay(ctx, p.text, W, H);
      const frame = new VideoFrame(canvas, { timestamp: ts, duration: frameDurUs });
      encoder.encode(frame, { keyFrame: f === 0 || f % 24 === 0 });
      frame.close();
      ts += frameDurUs;
    }
  }

  vid.src = '';
  return ts;
}

function loadBitmap(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload  = () => createImageBitmap(img).then(res).catch(rej);
    img.onerror = rej;
    img.src = src;
  });
}

function drawCover(ctx, bmp, W, H) {
  const scale = Math.max(W / bmp.width, H / bmp.height);
  const dw = bmp.width * scale, dh = bmp.height * scale;
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  ctx.drawImage(bmp, (W - dw) / 2, (H - dh) / 2, dw, dh);
}

function drawTextOverlay(ctx, text, W, H) {
  let fs = Math.round(H * 0.07);
  ctx.save();
  ctx.font = `bold ${fs}px 'Iansui', 'Noto Serif TC', serif`;
  const maxW = W * 0.88;
  if (ctx.measureText(text).width > maxW) {
    fs = Math.round(fs * maxW / ctx.measureText(text).width);
    ctx.font = `bold ${fs}px 'Iansui', 'Noto Serif TC', serif`;
  }
  const pad = Math.round(W * 0.035);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.lineJoin = 'round';
  ctx.lineWidth = Math.max(4, Math.round(fs * 0.18));
  ctx.strokeStyle = '#ffffff';
  ctx.strokeText(text, pad, pad);
  ctx.fillStyle = '#111111';
  ctx.fillText(text, pad, pad);
  ctx.restore();
}

async function drawIntroToCanvas(ctx, W, H, title, photoBase64) {
  if (photoBase64) {
    const bmp = await loadBitmap('data:image/jpeg;base64,' + photoBase64);
    drawCover(ctx, bmp, W, H); bmp.close();
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, 0, W, H);
  } else {
    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, '#1a0a00'); g.addColorStop(1, '#2c1810');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }
  if (title) {
    let fs = Math.round(H * 0.22);
    ctx.save();
    ctx.font = `bold ${fs}px 'Iansui', 'Noto Serif TC', serif`;
    const target = W * 0.7;
    const measured = ctx.measureText(title).width;
    if (measured > target) {
      fs = Math.round(fs * target / measured);
    }
    fs = Math.min(fs, Math.round(H * 0.28));
    ctx.font = `bold ${fs}px 'Iansui', 'Noto Serif TC', serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineJoin = 'round';
    ctx.lineWidth = Math.max(6, Math.round(fs * 0.12));
    ctx.strokeStyle = '#ffffff';
    ctx.strokeText(title, W / 2, H / 2);
    ctx.fillStyle = '#111111';
    ctx.fillText(title, W / 2, H / 2);
    ctx.restore();
  }
}

// 從 AudioBuffer 裁切並循環填充，末尾套漸出（fade out）
function buildAudioData(decoded, offsetFrames, numFrames, totalFrames = 0, fadeOutFrames = 0) {
  const numCh = decoded.numberOfChannels;
  const srcLen = decoded.length;
  const out = new Float32Array(2 * numFrames);
  for (let c = 0; c < 2; c++) {
    const src = decoded.getChannelData(Math.min(c, numCh - 1));
    for (let i = 0; i < numFrames; i++) {
      const globalFrame = offsetFrames + i;
      let gain = 1.0;
      if (fadeOutFrames > 0 && totalFrames > 0) {
        const framesLeft = totalFrames - globalFrame;
        if (framesLeft < fadeOutFrames) {
          gain = Math.max(0, framesLeft / fadeOutFrames);
        }
      }
      out[c * numFrames + i] = src[globalFrame % srcLen] * gain;
    }
  }
  return out;
}

// ── 伺服器合成（後備：舊版瀏覽器 / WebCodecs 不支援時） ─
async function makeVideoRemote() {
  const btn         = document.getElementById('make-btn');
  const progressBar = document.getElementById('progress-bar');
  const dlLink      = document.getElementById('download-link');

  btn.disabled = true;
  dlLink.style.display = 'none';
  setProgress(10);
  setStatus('info', '⏳ 正在處理素材，請稍候⋯⋯');

  try {
    const mediaData = await Promise.all(photos.map(p =>
      p.type === 'video' ? Promise.resolve(p.base64) : compressImage(p.dataUrl)
    ));
    setProgress(20);
    setStatus('info', '📤 正在送出製作請求⋯⋯');

    const totalDur    = photos.reduce((a, p) => a + (p.type === 'video' ? Math.round(p.duration) : 4), 0);
    const photoPayload = photos.map((p, i) => ({
      type: p.type || 'photo', data: mediaData[i],
      text: p.text.trim(), duration: p.type === 'video' ? p.duration : 4,
      mimeType: p.mimeType || 'image/jpeg'
    }));
    const payload = {
      photos: photoPayload, musicUrl: selectedMusic.url, musicName: selectedMusic.name,
      introTitle: (document.getElementById('intro-title')?.value || '').trim(),
      introPhoto: introPhotoData || '', photoCount: photos.length, duration: totalDur
    };
    const payloadStr = JSON.stringify(payload);
    if (payloadStr.length > 13 * 1024 * 1024)
      throw new Error(`素材太大（約 ${(payloadStr.length/1024/1024).toFixed(1)}MB），超過伺服器限制。`);

    const startRes = await fetch(N8N_WEBHOOK, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payloadStr
    });
    if (!startRes.ok) {
      let msg = `伺服器錯誤 (${startRes.status})`;
      try { const j = await startRes.json(); msg = j.message || msg; } catch {}
      throw new Error(msg);
    }
    const { jobId } = await startRes.json();
    if (!jobId) throw new Error('伺服器未回傳任務 ID，請確認 n8n workflow 設定');
    setProgress(35);

    const startTime = Date.now();
    const result = await new Promise((resolve, reject) => {
      const poll = async () => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        if (elapsed * 1000 > 10 * 60 * 1000) { reject(new Error('製作超時（超過 10 分鐘），請重試')); return; }
        progressBar.style.width = Math.min(35 + elapsed * 0.45, 90) + '%';
        const vidC  = photos.filter(p => p.type === 'video').length;
        const hint2 = vidC > 0 ? `${photos.length} 個素材（含 ${vidC} 段影片）` : `${photos.length} 張照片`;
        setStatus('info', `🎬 合成中⋯⋯ 已等待 ${elapsed} 秒（${hint2}）`);
        try {
          const res  = await fetch(`${N8N_STATUS_URL}?jobId=${encodeURIComponent(jobId)}`);
          if (res.ok) {
            const data = await res.json();
            if (data.status === 'done')  { resolve(data); return; }
            if (data.status === 'error') { reject(new Error(data.message || 'ffmpeg 失敗')); return; }
          }
        } catch {}
        setTimeout(poll, 2000);
      };
      poll();
    });

    setProgress(100);
    const binary = atob(result.base64Mp4);
    const bytes  = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'video/mp4' });
    const mb   = (blob.size / 1024 / 1024).toFixed(1);
    setStatus('success', `🎉 影片製作完成！大小：${mb} MB`);
    dlLink.href = URL.createObjectURL(blob);
    dlLink.download = `幻燈片_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '-')}.mp4`;
    dlLink.style.display = 'block';
    dlLink.click();

  } catch (e) {
    setProgress(0);
    setStatus('error', `❌ 製作失敗：${e.message}`);
    btn.disabled = false;
  }
}

function setStatus(type, msg) {
  const box = document.getElementById('status-box');
  box.className = type;
  box.style.display = 'block';
  box.textContent = msg;
}

function compressImage(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1920, maxH = 1080;
      let w = img.width, h = img.height;
      if (w > maxW || h > maxH) {
        const r = Math.min(maxW/w, maxH/h);
        w = Math.round(w*r); h = Math.round(h*r);
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.88).split(',')[1]);
    };
    img.src = dataUrl;
  });
}

// ─── 影片剪輯器 ───
let _trimFile=null, _trimUrl=null, _trimCb=null;
let _trimStart=0, _trimEnd=0, _trimTotal=0;
let _trimEventsReady=false;

function fmtT(s){
  const m=Math.floor(s/60), ss=Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${ss}`;
}

function updateTrimUI(){
  if(!_trimTotal) return;
  document.getElementById('tst').textContent=fmtT(_trimStart);
  document.getElementById('tet').textContent=fmtT(_trimEnd);
  const dur=_trimEnd-_trimStart;
  document.getElementById('tdur').textContent=`片段：${dur.toFixed(1)}s${dur>8?' ⚠️超過8s':''}`;
  const sp=_trimStart/_trimTotal, ep=_trimEnd/_trimTotal;
  document.getElementById('tsel').style.left=(sp*100)+'%';
  document.getElementById('tsel').style.width=((ep-sp)*100)+'%';
}

function openTrimmer(file, objectUrl, onDone) {
  if(!_trimEventsReady){ setupTrimmerEvents(); _trimEventsReady=true; }
  _trimFile=file; _trimUrl=objectUrl; _trimCb=onDone;
  const vid=document.getElementById('tv');
  vid.src=objectUrl;
  document.getElementById('trimmer-modal').style.display='flex';
  vid.onloadedmetadata=()=>{
    _trimTotal=vid.duration;
    _trimStart=0;
    _trimEnd=Math.min(_trimTotal,8);
    const SR=document.getElementById('tsr'), ER=document.getElementById('ter');
    SR.max=ER.max=10000;
    SR.value=0;
    ER.value=Math.round((_trimEnd/_trimTotal)*10000);
    updateTrimUI();
  };
}

function closeTrimmer(){
  document.getElementById('trimmer-modal').style.display='none';
  const vid=document.getElementById('tv');
  vid.pause(); vid.src='';
}

function setupTrimmerEvents(){
  const vid=document.getElementById('tv');
  const SR=document.getElementById('tsr');
  const ER=document.getElementById('ter');

  SR.addEventListener('input',()=>{
    _trimStart=(_trimTotal*SR.value/10000);
    if(_trimStart>=_trimEnd-0.3){
      _trimEnd=Math.min(_trimTotal,_trimStart+0.3);
      ER.value=Math.round((_trimEnd/_trimTotal)*10000);
    }
    updateTrimUI();
    vid.currentTime=_trimStart;
  });

  ER.addEventListener('input',()=>{
    _trimEnd=(_trimTotal*ER.value/10000);
    if(_trimEnd<=_trimStart+0.3){
      _trimStart=Math.max(0,_trimEnd-0.3);
      SR.value=Math.round((_trimStart/_trimTotal)*10000);
    }
    updateTrimUI();
    vid.currentTime=_trimEnd;
  });

  vid.addEventListener('timeupdate',()=>{
    if(_trimTotal>0 && vid.currentTime>=_trimEnd) vid.currentTime=_trimStart;
  });

  document.getElementById('tcancel').addEventListener('click',closeTrimmer);
  document.getElementById('tconfirm').addEventListener('click',doTrim);
}

async function doTrim(){
  const dur=_trimEnd-_trimStart;
  if(dur<0.3){alert('請選擇至少 0.3 秒的片段');return;}
  const vid=document.getElementById('tv');
  const proc=document.getElementById('tproc');
  proc.textContent=`⏳ 剪輯中，請等待約 ${Math.ceil(dur)} 秒⋯⋯`;
  proc.style.display='block';
  document.getElementById('tconfirm').disabled=true;
  document.getElementById('tcancel').disabled=true;
  try{
    const blob=await captureSegment(vid,_trimStart,_trimEnd);
    const mb=(blob.size/1024/1024).toFixed(1);
    if(blob.size>8*1024*1024){
      alert(`剪輯後仍有 ${mb}MB，超過 8MB。\n請選擇更短的片段（約 8 秒以內）。`);
      return;
    }
    const reader=new FileReader();
    reader.onload=e=>{
      closeTrimmer();
      if(_trimCb) _trimCb({base64:e.target.result.split(',')[1], mimeType:blob.type, duration:dur});
    };
    reader.readAsDataURL(blob);
  }catch(err){
    alert('剪輯失敗：'+err.message);
  }finally{
    proc.style.display='none';
    document.getElementById('tconfirm').disabled=false;
    document.getElementById('tcancel').disabled=false;
  }
}

function captureSegment(video, startTime, endTime){
  return new Promise((resolve,reject)=>{
    video.muted=true;
    const stream=video.captureStream?video.captureStream():(video.mozCaptureStream?video.mozCaptureStream():null);
    if(!stream){reject(new Error('瀏覽器不支援，請使用 Chrome'));return;}
    const mime=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm']
      .find(m=>MediaRecorder.isTypeSupported(m))||'';
    const rec=new MediaRecorder(stream, mime?{mimeType:mime}:{});
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data.size>0) chunks.push(e.data);};
    rec.onstop=()=>resolve(new Blob(chunks,{type:rec.mimeType||'video/webm'}));
    rec.onerror=e=>reject(e.error||new Error('錄製失敗'));
    // seek then record
    const onSeeked=()=>{
      video.removeEventListener('seeked',onSeeked);
      rec.start(100);
      video.play().catch(reject);
      setTimeout(()=>{ video.pause(); rec.stop(); },(endTime-startTime)*1000+400);
    };
    video.addEventListener('seeked',onSeeked);
    video.currentTime=startTime;
  });
}
