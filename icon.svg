<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="st" x="0" y="0" width="72" height="72"
             patternUnits="userSpaceOnUse"
             patternTransform="rotate(-45 256 186)">
      <rect width="72" height="72" fill="#1a1a1a"/>
      <rect width="36" height="72" fill="#fff"/>
    </pattern>
    <clipPath id="cp">
      <rect x="72" y="144" width="368" height="80" rx="14"/>
    </clipPath>
  </defs>

  <!-- 紅底背景 -->
  <rect width="512" height="512" rx="108" fill="#c0392b"/>

  <!-- 打板主體（白色板面） -->
  <rect x="72" y="216" width="368" height="246" rx="18" fill="#fff"/>

  <!-- 打板上方斜紋條 -->
  <g clip-path="url(#cp)">
    <rect x="0" y="0" width="512" height="512" fill="url(#st)"/>
  </g>

  <!-- 斜紋區輪廓 -->
  <rect x="72" y="144" width="368" height="80" rx="14"
        fill="none" stroke="#1a1a1a" stroke-width="5"/>

  <!-- 打板與板面分隔線 -->
  <rect x="72" y="222" width="368" height="8" fill="#d0c0b0"/>

  <!-- 板面橫線 -->
  <rect x="106" y="272" width="200" height="12" rx="6" fill="#e8d5c4"/>
  <rect x="106" y="308" width="160" height="12" rx="6" fill="#e8d5c4"/>
  <rect x="106" y="344" width="180" height="12" rx="6" fill="#e8d5c4"/>

  <!-- 音符頭 -->
  <ellipse cx="362" cy="406" rx="30" ry="23"
           transform="rotate(-20 362 406)" fill="#e67e22"/>
  <!-- 音符莖 -->
  <rect x="387" y="322" width="14" height="88" rx="7" fill="#e67e22"/>
  <!-- 音符旗 -->
  <path d="M401 324 C445 338 443 382 401 382"
        fill="none" stroke="#e67e22" stroke-width="14" stroke-linecap="round"/>
</svg>
