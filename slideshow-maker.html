<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相片幻燈片製作</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@400;700&display=swap');

  :root {
    --bg: #fdf6ee;
    --card: #ffffff;
    --accent: #c0392b;
    --accent2: #e67e22;
    --text: #2c1810;
    --muted: #8b6f5e;
    --border: #e8d5c4;
    --shadow: 0 4px 24px rgba(44,24,16,0.10);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 20%, #fde8d8 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, #fdf0e0 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Noto Serif TC', serif;
    color: var(--text);
    padding: 24px 16px 60px;
  }

  h1 {
    font-size: 2.6rem;
    font-weight: 700;
    text-align: center;
    color: var(--accent);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    font-size: 1.2rem;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 28px;
    max-width: 900px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px 36px;
    box-shadow: var(--shadow);
    border: 2px solid var(--border);
  }

  .step-label {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .step-num {
    background: var(--accent);
    color: #fff;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; font-weight: 700;
    flex-shrink: 0;
  }
  .card h2 {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 18px;
  }

  /* ── 照片上傳區 ── */
  #drop-zone {
    border: 3px dashed var(--accent2);
    border-radius: 16px;
    padding: 36px;
    text-align: center;
    cursor: pointer;
    transition: background .2s;
    background: #fffaf5;
  }
  #drop-zone:hover, #drop-zone.drag-over { background: #fff0e0; }
  #drop-zone .icon { font-size: 3.5rem; }
  #drop-zone p { font-size: 1.5rem; color: var(--muted); margin-top: 10px; }
  #drop-zone input { display: none; }

  /* ── 照片列表（每列一張） ── */
  #photo-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
  }

  .photo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #fffaf5;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    transition: border-color .2s, box-shadow .2s;
  }
  .photo-row:hover { border-color: var(--accent2); box-shadow: 0 2px 10px rgba(230,126,34,.12); }
  .photo-row.dragging { opacity: .4; border-color: var(--accent); }
  .photo-row.drag-over-top {
    border-top: 3px solid var(--accent);
    background: #fff5ec;
  }

  .drag-handle {
    font-size: 1.4rem;
    color: #c5a898;
    cursor: grab;
    flex-shrink: 0;
    user-select: none;
  }
  .photo-num {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
    user-select: none;
  }
  .photo-thumb {
    width: 88px;
    height: 66px;
    object-fit: cover;
    border-radius: 10px;
    flex-shrink: 0;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .photo-fname {
    font-size: .95rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 110px;
    flex-shrink: 0;
  }

  /* 文字輸入欄 */
  .photo-text-wrap {
    flex: 1;
    min-width: 0;
    position: relative;
  }
  .photo-text-input {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.55rem;
    width: 100%;
    padding: 9px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color .2s, background .2s;
  }
  .photo-text-input:focus { border-color: var(--accent2); }
  .photo-text-input::placeholder { color: #c8aba0; font-size: 1.1rem; font-family: 'Noto Serif TC', serif; }
  .photo-text-input.has-text {
    border-color: #7ec87a;
    background: #f4fff3;
  }

  .photo-del {
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: #c5a898;
    flex-shrink: 0;
    padding: 5px 7px;
    border-radius: 8px;
    transition: color .15s, background .15s;
    line-height: 1;
  }
  .photo-del:hover { color: var(--accent); background: #fdecea; }

  .hint { font-size: 1.1rem; color: var(--muted); margin-top: 12px; line-height: 1.7; }

  /* ── 音樂分類 tabs ── */
  .music-tabs {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 18px;
  }
  .music-tab {
    padding: 7px 18px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: #fffaf5;
    font-family: 'Noto Serif TC', serif;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--muted);
    transition: all .15s;
  }
  .music-tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .music-tab.active { border-color: var(--accent); background: var(--accent); color: #fff; }

  /* ── 音樂 ── */
  .music-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }
  .music-card {
    border: 2.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    transition: border-color .2s, background .2s;
    background: #fffaf5;
    position: relative;
    overflow: hidden;
  }
  .music-card:hover { border-color: var(--accent2); background: #fff5ec; }
  .music-card.selected { border-color: var(--accent); background: #fff0e8; }
  .music-icon { font-size: 2.2rem; flex-shrink: 0; }
  .music-name { font-size: 1.3rem; font-weight: 700; }
  .music-card .play-btn {
    margin-left: auto; background: none; border: none;
    font-size: 1.5rem; cursor: pointer; color: var(--accent2);
    min-width: 64px; display: flex; align-items: center;
    justify-content: center; gap: 4px; white-space: nowrap;
  }
  .play-btn .cd { font-size: .85rem; opacity: .8; }
  .music-preview-bar {
    position: absolute; bottom: 0; left: 0;
    height: 4px; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 0 2px 0 14px;
    pointer-events: none;
  }
  .music-loading { font-size: 1.3rem; color: var(--muted); padding: 16px 0; }

  /* ── 輸出 ── */
  #make-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 24px;
    font-size: 2rem;
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 4px;
    box-shadow: 0 6px 24px rgba(192,57,43,.3);
    transition: transform .15s, box-shadow .15s;
    display: flex; align-items: center; justify-content: center; gap: 14px;
  }
  #make-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(192,57,43,.4); }
  #make-btn:active { transform: translateY(0); }
  #make-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  #status-box {
    display: none;
    margin-top: 22px;
    border-radius: 14px;
    padding: 22px 26px;
    font-size: 1.4rem;
    line-height: 1.8;
    white-space: pre-wrap;
  }
  #status-box.info    { background: #e8f4fd; border: 2px solid #3498db; color: #1a5276; }
  #status-box.success { background: #e9f7ef; border: 2px solid #27ae60; color: #1e8449; }
  #status-box.error   { background: #fdedec; border: 2px solid #e74c3c; color: #922b21; }

  #progress-bar-wrap {
    height: 16px; background: #e8d5c4; border-radius: 8px;
    margin-top: 14px; overflow: hidden; display: none;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
    background-size: 200% 100%;
    border-radius: 8px; width: 0%;
    transition: width .5s ease;
    animation: shimmer 2s infinite linear;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  #download-link {
    display: none;
    margin-top: 18px;
    background: #27ae60;
    color: #fff;
    border-radius: 14px;
    padding: 18px 28px;
    font-size: 1.6rem;
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    text-decoration: none;
    text-align: center;
    letter-spacing: 3px;
    box-shadow: 0 4px 18px rgba(39,174,96,.3);
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #f0e6dc; }
  ::-webkit-scrollbar-thumb { background: #c8a99a; border-radius: 4px; }
</style>
</head>
<body>

<h1>基督徒回顧影片製作</h1>
<p class="subtitle">照片＋詩歌＝影片</p>

<div class="steps">

  <!-- STEP 1: 照片 + 每張文字 -->
  <div class="card">
    <div class="step-label"><div class="step-num">1</div>選擇照片，加上文字</div>
    <h2>點擊或拖曳上傳照片</h2>
    <div id="drop-zone">
      <div class="icon">🖼️</div>
      <p>點這裡選擇照片</p>
      <p style="font-size:1.1rem;margin-top:6px">（可以一次選很多張）</p>
      <input type="file" id="photo-input" accept="image/*" multiple>
    </div>
    <div id="photo-list"></div>
    <p class="hint" id="photo-count-hint" style="display:none"></p>
  </div>

  <!-- STEP 2: 音樂 -->
  <div class="card">
    <div class="step-label"><div class="step-num">2</div>選擇背景音樂</div>
    <h2>請選一首歌曲</h2>
    <div class="music-tabs" id="music-tabs"></div>
    <div class="music-grid" id="music-grid">
      <p class="music-loading">🎵 載入音樂庫中⋯⋯</p>
    </div>
  </div>

  <!-- STEP 3: 輸出 -->
  <div class="card">
    <div class="step-label"><div class="step-num">3</div>製作影片</div>
    <h2>確認後開始製作</h2>
    <div style="margin-bottom:20px;">
      <label style="display:block;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:1px;">片頭字幕（可不填）</label>
      <input type="text" id="intro-title" maxlength="24"
        placeholder="例：2024年生命回顧"
        style="width:100%;padding:12px 16px;font-size:1.2rem;font-family:inherit;border:2px solid var(--border);border-radius:12px;outline:none;background:var(--bg);"
        oninput="updateSummary()">
      <p class="hint" style="margin-top:6px;">填寫後影片最前面會出現 4 秒置中大字片頭</p>
    </div>
    <div id="summary" style="font-size:1.2rem;color:var(--muted);margin-bottom:18px;line-height:2;"></div>
    <button id="make-btn" disabled>🎬 &nbsp;開始製作影片</button>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="status-box"></div>
    <a id="download-link" href="#" download="slideshow.mp4">⬇️ &nbsp;下載影片</a>
  </div>

</div>

<script>
// ── 設定 ────────────────────────────────────────────
const MUSIC_BASE     = 'https://raw.githubusercontent.com/alice55505-source/easymaker123/main/music/';
const MUSIC_TREE_URL = 'https://api.github.com/repos/alice55505-source/easymaker123/git/trees/main?recursive=1';
const N8N_WEBHOOK    = 'https://n8n.alice55505.dpdns.org/webhook/slideshow';
const N8N_STATUS_URL = 'https://n8n.alice55505.dpdns.org/webhook/slideshow-status';
// 分類順序
const CATEGORY_ORDER = ['傳福音','福音','愛','同伴','牧養','奉獻','召會生活','親近主','患難安慰','台語詩歌'];
// ────────────────────────────────────────────────────

// photos[i] = { file, dataUrl, name, text }
let photos = [];
let selectedMusic = null;
let audioPlayer = null;
let dragSrcIdx = null;
const PREVIEW_SEC = 20;
let previewTimerId = null;
let previewIntervalId = null;

// ── 照片上傳 ──
const dropZone  = document.getElementById('drop-zone');
const photoInput = document.getElementById('photo-input');

dropZone.addEventListener('click', () => photoInput.click());
photoInput.addEventListener('change', e => addPhotos(e.target.files));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addPhotos(e.dataTransfer.files);
});

function addPhotos(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/') && !file.name.match(/\.(jpe?g|png|gif|webp|heic)$/i)) return;
    const reader = new FileReader();
    reader.onload = e => {
      photos.push({ file, dataUrl: e.target.result, name: file.name, text: '' });
      renderPhotoList();
    };
    reader.readAsDataURL(file);
  });
}

function renderPhotoList() {
  const list = document.getElementById('photo-list');
  list.innerHTML = '';

  photos.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'photo-row';
    row.draggable = true;
    row.dataset.idx = i;

    row.innerHTML = `
      <span class="drag-handle" title="拖曳排序">⠿</span>
      <span class="photo-num">${i + 1}</span>
      <img class="photo-thumb" src="${p.dataUrl}" alt="">
      <span class="photo-fname" title="${p.name}">${p.name}</span>
      <div class="photo-text-wrap">
        <input type="text"
          class="photo-text-input${p.text ? ' has-text' : ''}"
          placeholder="✍️  這張照片的文字（可不填）"
          value="${escapeAttr(p.text)}"
          data-idx="${i}">
      </div>
      <button class="photo-del" title="刪除" data-idx="${i}">✕</button>
    `;

    // 文字輸入即時更新
    row.querySelector('.photo-text-input').addEventListener('input', function() {
      photos[this.dataset.idx].text = this.value;
      this.classList.toggle('has-text', this.value.trim().length > 0);
      updateSummary();
    });

    // 刪除
    row.querySelector('.photo-del').addEventListener('click', function(e) {
      e.stopPropagation();
      photos.splice(+this.dataset.idx, 1);
      renderPhotoList();
    });

    // 拖曳排序
    row.addEventListener('dragstart', () => {
      dragSrcIdx = i;
      setTimeout(() => row.classList.add('dragging'), 0);
    });
    row.addEventListener('dragend', () => row.classList.remove('dragging'));
    row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over-top'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over-top'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over-top');
      if (dragSrcIdx !== null && dragSrcIdx !== i) {
        const moved = photos.splice(dragSrcIdx, 1)[0];
        photos.splice(i, 0, moved);
        renderPhotoList();
      }
    });

    list.appendChild(row);
  });

  // 提示
  const hint = document.getElementById('photo-count-hint');
  if (photos.length > 0) {
    const dur = photos.length * 4;
    const withText = photos.filter(p => p.text.trim()).length;
    hint.style.display = 'block';
    hint.innerHTML =
      `共 <strong>${photos.length}</strong> 張照片，影片長度約 <strong>${dur}</strong> 秒` +
      (withText > 0 ? `，其中 <strong>${withText}</strong> 張有文字` : '') +
      `。<br>可拖曳 ⠿ 調整順序。`;
  } else {
    hint.style.display = 'none';
  }

  updateSummary();
  checkReady();
}

function escapeAttr(s) {
  return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── 音樂庫 ──
let allMusicByCategory = {}; // { 分類: [{name, url, filename}] }
let activeCategory = '';

async function loadMusicList() {
  const grid = document.getElementById('music-grid');
  const tabsEl = document.getElementById('music-tabs');
  try {
    const res = await fetch(MUSIC_TREE_URL);
    if (!res.ok) throw new Error('無法連接音樂庫');
    const { tree } = await res.json();

    // 解析 music/{分類}/{歌名}.mp3
    allMusicByCategory = {};
    tree.forEach(item => {
      const m = item.path.match(/^music\/([^/]+)\/([^/]+\.mp3)$/i);
      if (!m) return;
      const [, cat, file] = m;
      if (!allMusicByCategory[cat]) allMusicByCategory[cat] = [];
      allMusicByCategory[cat].push({
        name: file.replace(/\.mp3$/i, ''),
        filename: file,
        url: MUSIC_BASE + encodeURIComponent(cat) + '/' + encodeURIComponent(file)
      });
    });

    const cats = Object.keys(allMusicByCategory);
    if (cats.length === 0) {
      grid.innerHTML = '<p class="music-loading">⚠️ 音樂庫是空的</p>';
      return;
    }

    // 建 tabs：依順序出現的分類（無「全部」）
    const orderedCats = CATEGORY_ORDER.filter(c => allMusicByCategory[c]);
    if (!activeCategory || !allMusicByCategory[activeCategory]) {
      activeCategory = orderedCats[0] || '';
    }
    tabsEl.innerHTML = '';
    orderedCats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'music-tab' + (cat === activeCategory ? ' active' : '');
      btn.textContent = cat;
      btn.addEventListener('click', () => {
        activeCategory = cat;
        tabsEl.querySelectorAll('.music-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMusicGrid();
      });
      tabsEl.appendChild(btn);
    });

    renderMusicGrid();
  } catch(e) {
    grid.innerHTML = `<p class="music-loading">⚠️ 載入失敗：${e.message}</p>`;
  }
}

function renderMusicGrid() {
  const grid = document.getElementById('music-grid');
  grid.innerHTML = '';

  const songs = allMusicByCategory[activeCategory] || [];

  if (songs.length === 0) {
    grid.innerHTML = '<p class="music-loading">此分類尚無詩歌</p>';
    return;
  }

  songs.forEach(s => {
    const card = document.createElement('div');
    card.className = 'music-card';
    card.innerHTML = `
      <span class="music-icon">🎵</span>
      <div><div class="music-name">${s.name}</div></div>
      <button class="play-btn" title="試聽 20 秒">▶</button>
      <div class="music-preview-bar"></div>
    `;
    // 如果已選中此歌，恢復 selected 樣式
    if (selectedMusic && selectedMusic.url === s.url) card.classList.add('selected');

    card.addEventListener('click', e => {
      if (e.target.classList.contains('play-btn')) { togglePlay(card, s.url, e.target); return; }
      selectMusic(card, s.filename, s.url);
    });
    grid.appendChild(card);
  });
}

function selectMusic(card, name, url) {
  document.querySelectorAll('.music-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedMusic = { name, url };
  updateSummary(); checkReady();
}

function stopAllPreview() {
  if (audioPlayer) { audioPlayer.pause(); audioPlayer = null; }
  clearTimeout(previewTimerId);
  clearInterval(previewIntervalId);
  previewTimerId = previewIntervalId = null;
  document.querySelectorAll('.play-btn').forEach(b => b.textContent = '▶');
  document.querySelectorAll('.music-preview-bar').forEach(el => {
    el.style.transition = 'none'; el.style.width = '0%';
  });
}

function togglePlay(card, url, btn) {
  const isSame = audioPlayer && audioPlayer._url === url && !audioPlayer.paused;
  stopAllPreview();
  if (isSame) return;
  audioPlayer = new Audio(url);
  audioPlayer._url = url;
  audioPlayer.play();
  const bar = card.querySelector('.music-preview-bar');
  requestAnimationFrame(() => {
    bar.style.transition = 'none'; bar.style.width = '0%';
    requestAnimationFrame(() => {
      bar.style.transition = `width ${PREVIEW_SEC}s linear`;
      bar.style.width = '100%';
    });
  });
  let rem = PREVIEW_SEC;
  btn.innerHTML = `⏸ <span class="cd">${rem}s</span>`;
  previewIntervalId = setInterval(() => {
    rem--;
    if (rem > 0) btn.innerHTML = `⏸ <span class="cd">${rem}s</span>`;
    else btn.textContent = '▶';
  }, 1000);
  previewTimerId = setTimeout(stopAllPreview, PREVIEW_SEC * 1000);
  audioPlayer.addEventListener('ended', stopAllPreview);
}

// ── 摘要 & 按鈕 ──
function updateSummary() {
  const s = document.getElementById('summary');
  const withText = photos.filter(p => p.text.trim()).length;
  let lines = [];
  if (photos.length > 0) {
    lines.push(`📷 照片：${photos.length} 張（${photos.length * 4} 秒）`);
    if (withText > 0) lines.push(`✍️ 有文字：${withText} 張`);
  }
  if (selectedMusic) lines.push(`🎵 音樂：${selectedMusic.name.replace(/\.mp3$/i,'')}`);
  const introTitle = (document.getElementById('intro-title')?.value || '').trim();
  if (introTitle) lines.push(`🎬 片頭字幕：${introTitle}`);
  s.innerHTML = lines.join('<br>') || '（請先完成步驟 1 和 2）';
}

function checkReady() {
  document.getElementById('make-btn').disabled = !(photos.length > 0 && selectedMusic);
}

// ── 製作影片 ──
document.getElementById('make-btn').addEventListener('click', async () => {
  if (!photos.length || !selectedMusic) return;
  const btn          = document.getElementById('make-btn');
  const progressWrap = document.getElementById('progress-bar-wrap');
  const progressBar  = document.getElementById('progress-bar');
  const dlLink       = document.getElementById('download-link');

  btn.disabled = true;
  dlLink.style.display = 'none';
  progressWrap.style.display = 'block';
  progressBar.style.width = '10%';
  setStatus('info', '⏳ 正在處理照片，請稍候⋯⋯');

  try {
    // 壓縮照片
    const photoData = await Promise.all(photos.map(p => compressImage(p.dataUrl)));
    progressBar.style.width = '20%';
    setStatus('info', '📤 正在送出製作請求⋯⋯');

    const photoPayload = photos.map((p, i) => ({
      data: photoData[i],
      text: p.text.trim()
    }));

    const payload = {
      photos: photoPayload,
      musicUrl: selectedMusic.url,
      musicName: selectedMusic.name,
      introTitle: (document.getElementById('intro-title')?.value || '').trim(),
      photoCount: photos.length,
      duration: photos.length * 4
    };

    // POST → 立刻拿 jobId（n8n 幾秒內回應）
    const startRes = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!startRes.ok) {
      let msg = `伺服器錯誤 (${startRes.status})`;
      try { const j = await startRes.json(); msg = j.message || msg; } catch {}
      throw new Error(msg);
    }

    const startData = await startRes.json();
    const jobId = startData.jobId;
    if (!jobId) throw new Error('伺服器未回傳任務 ID，請確認 n8n workflow 設定');

    progressBar.style.width = '35%';

    // 輪詢直到完成（最多 10 分鐘）
    const POLL_INTERVAL = 2000;
    const POLL_TIMEOUT  = 10 * 60 * 1000;
    const startTime = Date.now();

    const result = await new Promise((resolve, reject) => {
      const poll = async () => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        if (elapsed * 1000 > POLL_TIMEOUT) {
          reject(new Error('製作超時（超過 10 分鐘），請重試'));
          return;
        }
        // 進度條：35% → 90%，按時間緩慢推進
        const fakeP = Math.min(35 + elapsed * 0.45, 90);
        progressBar.style.width = fakeP + '%';
        setStatus('info', `🎬 合成中⋯⋯ 已等待 ${elapsed} 秒（共 ${photos.length} 張照片）`);

        try {
          const res = await fetch(`${N8N_STATUS_URL}?jobId=${encodeURIComponent(jobId)}`);
          if (res.ok) {
            const data = await res.json();
            if (data.status === 'done')  { resolve(data); return; }
            if (data.status === 'error') { reject(new Error(data.message || 'ffmpeg 失敗')); return; }
          }
        } catch { /* network hiccup, keep polling */ }

        setTimeout(poll, POLL_INTERVAL);
      };
      poll();
    });

    progressBar.style.width = '100%';

    // base64 → Blob → 下載
    const binary = atob(result.base64Mp4);
    const bytes  = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'video/mp4' });
    const url  = URL.createObjectURL(blob);
    const mb   = (blob.size / 1024 / 1024).toFixed(1);

    setStatus('success', `🎉 影片製作完成！大小：${mb} MB`);
    dlLink.href = url;
    dlLink.download = `幻燈片_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.mp4`;
    dlLink.style.display = 'block';
    dlLink.click();

  } catch(e) {
    progressBar.style.width = '0%';
    setStatus('error', `❌ 製作失敗：${e.message}`);
    btn.disabled = false;
  }
});

function setStatus(type, msg) {
  const box = document.getElementById('status-box');
  box.className = type;
  box.style.display = 'block';
  box.textContent = msg;
}

function compressImage(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1920, maxH = 1080;
      let w = img.width, h = img.height;
      if (w > maxW || h > maxH) {
        const r = Math.min(maxW/w, maxH/h);
        w = Math.round(w*r); h = Math.round(h*r);
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.88).split(',')[1]);
    };
    img.src = dataUrl;
  });
}

// 初始化
loadMusicList();
updateSummary();
